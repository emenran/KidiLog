<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kiddie Log Launcher</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Arial, system-ui, sans-serif; background: #170604; color: #fff4c9; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; }
    .panel { width: min(100%, 420px); }
    h1 { font-family: Georgia, "Times New Roman", serif; font-size: 48px; margin: 0 0 8px; color: #ffe49b; }
    p { color: rgba(255,244,201,.75); line-height: 1.45; }
    button, a.button { display: block; width: 100%; min-height: 58px; border: 0; border-radius: 999px; background: #8b1416; color: #fff4c9; font-size: 18px; font-weight: 900; text-decoration: none; padding: 17px 20px; margin-top: 18px; }
    small { display: block; margin-top: 26px; color: rgba(255,244,201,.45); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Kiddie Log</h1>
      <p>Evangel ICGC Children Service Attendance</p>
      <button type="button" onclick="openApp()">Open App</button>
      <p>If it does not open, <a id="fallbackLink" href="#" style="color:#f3d37a;font-weight:900;">tap here</a>.</p>
      <small>Dataformatic Production © 2026</small>
    </section>
  </main>

  <script>
    /*
      Replace this with your latest Google Apps Script Web App /exec URL after deployment.
      Do not paste the Google Sheet URL here.
    */
    const APP_URL = 'https://script.google.com/macros/s/AKfycbyED8wJ2fiSNwjKFE9XzhEFRqi07RKjmltVBY7YbtHCZpGPBC-9gSoF9f1YxKQ8rZXdnQ/exec';

    function openApp() {
      window.location.assign(APP_URL);
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('fallbackLink').setAttribute('href', APP_URL);
    });
  </script>
</body>
</html>
